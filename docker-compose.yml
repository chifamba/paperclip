services:
  db:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U paperclip -d paperclip" ]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - /System/Volumes/Data/storage/postgres/paperclip:/var/lib/postgresql
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "false"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://robertsacstudio.lan:80}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-d2a440f5c5d9413c0a7f9bb35093faa96bc1b8ce7a82faeabd252dacc30e0e351bab111cab37481d91ade13004da9fed5dba95f941cc62ff6087f15156d8c7ef}"
      ANTHROPIC_AUTH_TOKEN: "${ANTHROPIC_AUTH_TOKEN:-ollama}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-http://robertsacstudio:11434}"
    volumes:
      - /System/Volumes/Data/storage/paperclip:/paperclip
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  paperclip-data:
